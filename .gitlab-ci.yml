# Example: how a consuming project can use the CI templates.
# Copy this pattern into your project's .gitlab-ci.yml
# and adjust variables and includes (e.g. use project: for a shared template repo).

include:
  - project: "devops/ci-templates"
    ref: v1
    file: templates/config/stages.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/config/defaults.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/config/variables.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/security/node_security_audit.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/security/owasp_dependency_check.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/security/semgrep_sast.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/gates/security_approval.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/build/build.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/build/trivy_image_scan.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/gates/image_approval.yml
  - project: "devops/ci-templates"
    ref: v1
    file: templates/deploy/deploy_staging.yml

# Project-specific overrides (set in .gitlab-ci.yml or in GitLab CI/CD Variables)
variables:
  PIPELINE_BRANCH: "main"
  PIPELINE_BRANCH_ALT: "master"
  RUNNER_TAG_SECURITY: "CG-GR-APP-DEV-shell"
  RUNNER_TAG_BUILD: "CG-GR-APP-DEV-shell"
  RUNNER_TAG_DEPLOY: "CG-GR-APP-PRD-1"
  DEPLOY_ENV_NAME: "staging"
  DEPLOY_ENV_URL: "https://scm.cinnagen.com/"
  ENV_VARIABLES_LIST_PATH: "ci/env-variables.list"
  COMPOSE_FILE: "docker-compose.yml"


  ENABLE_SECURITY_AUDIT: "false"
  ENABLE_OWASP: "false"
  ENABLE_SEMGREP: "false"
  ENABLE_TRIVY: "true"

# If the pipeline build job does not pass NEXT_PUBLIC_ENCRYPTION_KEY as a Docker build-arg,
# extend the build job (from templates/build/build.yml) to pass it, or ask devops to add it.
# See src/docs/architecture/DOCKER_BUILD_ENV_VARS.md (Troubleshooting).
